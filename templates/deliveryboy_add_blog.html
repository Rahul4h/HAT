{% extends 'deliveryboy_base.html' %}
{% block title %}Write Blog{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0">Write Blog</h3>

    <a href="{% url 'deliveryboy_home' %}" 
       class="btn btn-outline-secondary">
        Back
    </a>
</div>


<div class="card shadow-sm">

    <div class="card-body">

        <form method="post" enctype="multipart/form-data">

            {% csrf_token %}


            {% if form.errors %}

            <div class="alert alert-danger">
                Please fix the highlighted blog fields and submit again.
            </div>

            {% endif %}



            {{ form.as_p }}



            <!-- Multiple Blog Images -->

            <div class="mb-3">
    <label class="form-label">
        Blog Photos (Maximum 10)
    </label>

    <input 
        type="file"
        id="imageInput"
        name="images"
        multiple
        class="form-control"
        accept="image/*"
    >

              <div id="preview" class="mt-2 d-flex flex-wrap"></div>

               <small class="text-muted">
                 You can upload up to 10 photos.
                  </small>
                </div>



            <button 
                type="submit" 
                class="btn btn-success">

                Publish Blog

            </button>


        </form>


    </div>

</div>
<script>
let selectedFiles = [];
const input = document.getElementById('imageInput');
const preview = document.getElementById('preview');

input.addEventListener('change', function(e) {
    selectedFiles = selectedFiles.concat(Array.from(e.target.files));

    if (selectedFiles.length > 10) {
        alert('Maximum 10 photos allowed.');
        selectedFiles = selectedFiles.slice(0, 10);
    }

    const dataTransfer = new DataTransfer();
    selectedFiles.forEach(file => dataTransfer.items.add(file));
    input.files = dataTransfer.files;

    preview.innerHTML = '';
    selectedFiles.forEach(file => {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.style.width = '80px';
        img.style.height = '80px';
        img.style.objectFit = 'cover';
        img.style.margin = '5px';
        img.style.borderRadius = '8px';
        preview.appendChild(img);
    });
});
</script>





{% endblock %}
