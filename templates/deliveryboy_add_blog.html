{% extends 'deliveryboy_base.html' %}
{% block title %}Write Blog{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0">Write Blog</h3>

    <a href="{% url 'deliveryboy_home' %}" 
       class="btn btn-outline-secondary">
        Back
    </a>
</div>


<div class="card shadow-sm">

    <div class="card-body">

        <form method="post" enctype="multipart/form-data">

            {% csrf_token %}


            {% if form.errors %}

            <div class="alert alert-danger">
                Please fix the highlighted blog fields and submit again.
            </div>

            {% endif %}



            {{ form.as_p }}



            <!-- Multiple Blog Images -->

            <div class="mb-3">

                <label class="form-label">
                    Blog Photos (Maximum 10)
                </label>


                <input 
                    type="file"
                    name="images"
                    multiple
                    class="form-control"
                    accept="image/*"
                >


                <small class="text-muted">
                    You can upload up to 10 photos.
                </small>

            </div>




            <button 
                type="submit" 
                class="btn btn-success">

                Publish Blog

            </button>


        </form>


    </div>

</div>
<script>
document.querySelector('input[name="images"]').addEventListener('change', function(e) {
    if (e.target.files.length > 10) {
        alert('Maximum 10 photos allowed.');
        e.target.value = '';
    }
});
</script>



{% endblock %}
